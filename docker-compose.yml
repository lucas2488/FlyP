services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fly_user
      POSTGRES_PASSWORD: fly_password
      POSTGRES_DB: fly_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fly_user -d fly_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://fly_user:fly_password@db:5432/fly_db
      SYNC_DATABASE_URL: postgresql://fly_user:fly_password@db:5432/fly_db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
