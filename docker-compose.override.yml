# Local development — aplicado automáticamente por `docker compose up`
# En producción usar: docker compose -f docker-compose.yml up -d

services:

  n8n:
    environment:
      WEBHOOK_URL: http://localhost/n8n/
      N8N_HOST: localhost
      N8N_PROTOCOL: http
      NODE_ENV: development

  nginx:
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    ports:
      - "80:80"

  certbot:
    entrypoint: "/bin/sh -c 'echo [certbot] disabled in local mode; sleep infinity'"
